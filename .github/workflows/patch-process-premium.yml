name: Patch process premium
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch-process:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          css = r'''
    /* PROCESS PREMIUM */
    .process-section{position:relative;isolation:isolate;overflow:hidden;background:radial-gradient(circle at 10% 12%,rgba(216,182,171,.20),transparent 25rem),radial-gradient(circle at 90% 78%,rgba(147,162,138,.14),transparent 24rem),linear-gradient(180deg,var(--ivory),#fbf4eb 48%,#f7eee4)}.process-section:before{content:"";position:absolute;left:8%;top:82px;width:260px;height:260px;border:1px solid rgba(182,157,107,.12);border-radius:45% 55% 50% 50%;background:rgba(255,253,248,.18);z-index:-1}.process-section:after{content:"";position:absolute;right:-140px;bottom:30px;width:390px;height:320px;border-radius:55% 45% 48% 52%;background:rgba(147,162,138,.08);z-index:-1}.process-section .section-head{max-width:780px;margin-bottom:38px}.process-section .section-head.center{text-align:center;margin-inline:auto}.process-section .section-head p{max-width:620px;margin:15px auto 0}.process{position:relative;display:grid;grid-template-columns:1fr;gap:18px;counter-reset:none}.process:before{content:"";position:absolute;left:28px;top:34px;bottom:34px;width:1px;background:linear-gradient(180deg,transparent,rgba(182,157,107,.45),rgba(147,162,138,.32),transparent);z-index:0}.process-card{--step-accent:var(--gold);position:relative;isolation:isolate;display:grid;gap:18px;min-height:100%;padding:24px 22px 22px 78px;border:1px solid rgba(225,209,193,.9);border-radius:30px;background:linear-gradient(145deg,rgba(255,253,248,.94),rgba(250,243,235,.68));box-shadow:0 15px 36px rgba(36,27,24,.06);overflow:visible;counter-increment:initial;transition:transform .34s var(--premium),box-shadow .34s var(--premium),border-color .34s var(--premium),background .34s var(--premium)}.process-card:nth-child(2){--step-accent:var(--sage)}.process-card:nth-child(3){--step-accent:var(--clay)}.process-card:before{content:attr(data-step);display:block;position:absolute;right:18px;bottom:10px;width:auto;height:auto;margin:0;border-radius:0;background:transparent;color:rgba(112,89,55,.105);font-family:"Cormorant Garamond",Georgia,serif;font-size:5.2rem;font-weight:700;line-height:1;letter-spacing:-.08em;pointer-events:none;transition:transform .34s var(--premium),color .34s var(--premium)}.process-card:after{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(320px circle at var(--mx,74%) var(--my,18%),color-mix(in srgb,var(--step-accent) 12%,transparent),transparent 58%);opacity:0;z-index:-1;transition:opacity .32s var(--premium)}.process-card:hover{transform:translateY(-5px);border-color:color-mix(in srgb,var(--step-accent) 44%,var(--line));box-shadow:0 26px 64px rgba(36,27,24,.105);background:linear-gradient(145deg,rgba(255,253,248,.98),rgba(250,243,235,.78))}.process-card:hover:before{transform:translateY(-4px);color:rgba(112,89,55,.16)}.process-card:hover:after{opacity:1}.process-marker{position:absolute;left:8px;top:24px;width:42px;height:42px;display:grid;place-items:center;border:1px solid color-mix(in srgb,var(--step-accent) 34%,var(--line));border-radius:50%;background:var(--paper);box-shadow:0 0 0 8px #fbf4eb,0 12px 24px rgba(36,27,24,.055);z-index:2;transition:transform .34s var(--premium),box-shadow .34s var(--premium)}.process-card:hover .process-marker{transform:scale(1.04);box-shadow:0 0 0 8px #fbf4eb,0 16px 30px rgba(36,27,24,.08)}.process-step-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}.process-badge{display:inline-flex;align-items:center;gap:8px;width:max-content;max-width:100%;padding:8px 11px;border:1px solid color-mix(in srgb,var(--step-accent) 34%,var(--line));border-radius:999px;background:rgba(255,253,248,.72);color:#6a5c52;font-size:.62rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase;line-height:1}.process-badge span{width:6px;height:6px;border-radius:50%;background:var(--step-accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--step-accent) 13%,transparent)}.process-icon{display:grid;place-items:center;width:54px;height:54px;flex:0 0 auto;border:1px solid color-mix(in srgb,var(--step-accent) 34%,var(--line));border-radius:19px;background:linear-gradient(145deg,rgba(255,253,248,.86),rgba(237,242,233,.32));box-shadow:0 12px 25px rgba(36,27,24,.045);transition:transform .32s var(--premium),background .32s var(--premium)}.process-icon svg{width:30px;height:30px;stroke:color-mix(in srgb,var(--step-accent) 74%,var(--ink));stroke-width:1.55;fill:none;stroke-linecap:round;stroke-linejoin:round}.process-card:hover .process-icon{transform:translateY(-3px) rotate(-2deg);background:rgba(255,253,248,.96)}.process-content{position:relative;z-index:1}.process-content h3{max-width:12rem;color:var(--ink);font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(1.72rem,5vw,2.15rem);line-height:1.02;letter-spacing:-.045em}.process-content p{max-width:25rem;margin-top:11px;font-size:.94rem;line-height:1.58;color:#6d6158}.process-footer{position:relative;z-index:1;display:flex;align-items:center;gap:10px;margin-top:4px;padding-top:16px;border-top:1px solid rgba(225,209,193,.72);color:#75603c;font-size:.7rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.process-footer:before{content:"";width:28px;height:1px;background:color-mix(in srgb,var(--step-accent) 55%,var(--gold));transition:width .3s var(--premium)}.process-card:hover .process-footer:before{width:44px}
    @media(min-width:760px){.process{grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;align-items:stretch}.process:before{left:8%;right:8%;top:68px;bottom:auto;width:auto;height:1px;background:linear-gradient(90deg,transparent,rgba(182,157,107,.46),rgba(147,162,138,.34),transparent)}.process-card{padding:26px 24px 24px;min-height:318px}.process-card:nth-child(2){transform:translateY(24px)}.process-card:nth-child(2):hover{transform:translateY(18px)}.process-card:nth-child(3){transform:translateY(6px)}.process-card:nth-child(3):hover{transform:translateY(0)}.process-marker{left:24px;top:47px}.process-card .process-badge{margin-left:58px}.process-section .section-head{margin-bottom:46px}}
    @media(min-width:930px){.process{gap:22px}.process-card{padding:30px 28px 26px;min-height:340px}.process-icon{width:60px;height:60px;border-radius:21px}.process-icon svg{width:33px;height:33px}.process-content h3{font-size:2.22rem}.process-content p{font-size:.96rem}.process-card:before{font-size:6.2rem;right:22px;bottom:8px}.process-section .section-head{margin-bottom:52px}}
    @media(max-width:759px){.process-section .section-head.center{text-align:left;margin-inline:0}.process-section .section-head{margin-bottom:26px}.process-card{padding-left:74px}.process-card:before{font-size:4.6rem}.process-icon{width:50px;height:50px}.process-content h3{max-width:14rem}.process-footer{font-size:.64rem}}
    @media(max-width:430px){.process{gap:14px}.process:before{left:23px}.process-card{padding:22px 18px 20px 64px;border-radius:26px}.process-marker{left:5px;top:22px;width:36px;height:36px;box-shadow:0 0 0 6px #fbf4eb,0 10px 20px rgba(36,27,24,.055)}.process-step-top{gap:12px}.process-badge{font-size:.56rem;padding:7px 9px}.process-icon{width:46px;height:46px;border-radius:17px}.process-icon svg{width:27px;height:27px}.process-content h3{font-size:1.58rem}.process-content p{font-size:.88rem}.process-card:before{font-size:3.8rem;right:14px;bottom:8px}}
    '''

          section = r'''<section class="section process-section" id="proceso"><div class="container"><div class="section-head center reveal"><span class="eyebrow">Proceso</span><h2>Una forma tranquila de decidir</h2><p>Queremos que entiendas qué va a pasar, por qué se recomienda y qué puedes esperar de forma realista.</p></div><div class="process stagger" aria-label="Proceso de valoración y tratamiento"><article class="process-card" data-step="01"><span class="process-marker" aria-hidden="true"></span><div class="process-step-top"><div class="process-badge"><span></span>Paso 01</div><div class="process-icon" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M7.5 10.5c0-2.1 1.7-3.8 3.8-3.8h9.4c2.1 0 3.8 1.7 3.8 3.8v5.2c0 2.1-1.7 3.8-3.8 3.8h-5.1l-5.7 4.8.7-4.8c-1.8-.3-3.1-1.9-3.1-3.8Z"/><path d="M12 12.2h8"/><path d="M12 15.4h5.2"/></svg></div></div><div class="process-content"><h3>Nos cuentas tu objetivo</h3><p>Por WhatsApp o en consulta, escuchamos qué quieres mejorar y qué te preocupa.</p></div><div class="process-footer">Escucha inicial</div></article><article class="process-card" data-step="02"><span class="process-marker" aria-hidden="true"></span><div class="process-step-top"><div class="process-badge"><span></span>Paso 02</div><div class="process-icon" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 6.5c5.4 0 9.8 3.8 11.5 9.5-1.7 5.7-6.1 9.5-11.5 9.5S6.2 21.7 4.5 16C6.2 10.3 10.6 6.5 16 6.5Z"/><circle cx="16" cy="16" r="3.8"/><path d="M10.5 25.5c2.9 1.6 8.1 1.6 11 0"/></svg></div></div><div class="process-content"><h3>Valoramos tu piel</h3><p>Revisamos sensibilidad, hábitos, rutina y expectativas antes de elegir protocolo.</p></div><div class="process-footer">Criterio profesional</div></article><article class="process-card" data-step="03"><span class="process-marker" aria-hidden="true"></span><div class="process-step-top"><div class="process-badge"><span></span>Paso 03</div><div class="process-icon" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M9 20.5c2.4 4.2 8.3 5.4 12.1 2.1 3.6-3.1 3.9-8.5.9-12"/><path d="M22 10.6h-5.2"/><path d="M22 10.6V5.4"/><path d="M12.4 16.8 15.3 20l5.2-6"/></svg></div></div><div class="process-content"><h3>Tratamos con seguimiento</h3><p>Te explicamos cuidados posteriores y cuándo tendría sentido volver.</p></div><div class="process-footer">Continuidad y cuidado</div></article></div></div></section>'''

          if '/* PROCESS PREMIUM */' not in s:
              old_css = '.process{display:grid;gap:14px;counter-reset:step}.process-card{position:relative;overflow:hidden;padding:24px;border:1px solid rgba(225,209,193,.92);border-radius:24px;background:rgba(255,253,248,.74);box-shadow:var(--softShadow);counter-increment:step}.process-card:before{content:"0" counter(step);display:inline-grid;place-items:center;width:46px;height:46px;margin-bottom:18px;border-radius:50%;background:var(--ink);color:#fff8ed;font-weight:900}'
              s = s.replace(old_css, css, 1)
          start = s.find('<section class="section" id="proceso">')
          end = s.find('<section class="section clinic-editorial" id="clinica">')
          if start != -1 and end != -1:
              s = s[:start] + section + '\n' + s[end:]
          s = s.replace('treatmentCards.forEach(card=>card.addEventListener(\'pointermove\',event=>{const rect=card.getBoundingClientRect();card.style.setProperty(\'--mx\',`${event.clientX-rect.left}px`);card.style.setProperty(\'--my\',`${event.clientY-rect.top}px`)}));', 'treatmentCards.forEach(card=>card.addEventListener(\'pointermove\',event=>{const rect=card.getBoundingClientRect();card.style.setProperty(\'--mx\',`${event.clientX-rect.left}px`);card.style.setProperty(\'--my\',`${event.clientY-rect.top}px`)}));document.querySelectorAll(\'.process-card\').forEach(card=>card.addEventListener(\'pointermove\',event=>{const rect=card.getBoundingClientRect();card.style.setProperty(\'--mx\',`${event.clientX-rect.left}px`);card.style.setProperty(\'--my\',`${event.clientY-rect.top}px`)}));')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Remove workflow
        run: rm -f .github/workflows/patch-process-premium.yml
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-process-premium.yml
          git commit -m "Rediseñar sección Proceso premium" || exit 0
          git push
