name: Patch treatment filters clipping

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-filters:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch CSS for treatment filters
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          marker = '/* Fix clipping treatment filters */'
          fix = '''\n    /* Fix clipping treatment filters */\n    .skin-filter-row{overflow-x:auto;overflow-y:visible;padding:12px 14px 16px;margin:2px -14px 24px;scrollbar-width:none;isolation:isolate}.skin-filter-row::-webkit-scrollbar{display:none}.skin-filter{min-height:44px;line-height:1;box-sizing:border-box;overflow:visible;position:relative;z-index:1}.skin-filter:hover,.skin-filter.active,.skin-filter:focus-visible{z-index:3}.skin-filter:focus-visible{outline:2px solid rgba(180,151,107,.45);outline-offset:4px}.treatments-head{margin-bottom:14px}.treatments-premium .container{overflow:visible}\n    '''
          if marker not in s:
              if '@keyframes waPulse' not in s:
                  raise SystemExit('No se encontró el punto de inserción CSS')
              s = s.replace('@keyframes waPulse', fix + '@keyframes waPulse', 1)
              p.write_text(s, encoding='utf-8')
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/patch-filters.yml
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-filters.yml
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Corregir recorte de filtros de tratamientos"
          git push
